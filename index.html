<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>CatOS</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <main>
        <div id="MainBoxHeader"><p id="CatOSLabel">CatOS <p id="CatOSSubLabel">(Fish Version)</p></div></p> 
        <div id="MainBox">
          <div id="UsernameDiv">
            <label id="UsernameLabel" for="Username">Username</label>
            <input type="text" id="UsernameBox" placeholder="Enter Username" name="username" required>
          </div>
            <br>
          <div id="PasswordDiv">
            <label id="PasswordLabel" for="Password">Password</label>
            <input id="PasswordBox" type="text" placeholder="Enter Password" name="password" required>
          </div> 
            <button onclick="LoginButton()"> LOGIN </button>
           
        </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
