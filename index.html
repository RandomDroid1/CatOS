<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>CatOS</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>

    <main>
        <div id="MainBoxHeader">
          <p id="CatOSLabel">CatOS</p> 
           <span class="tooltip-trigger" data-tooltip="Don't have the login? That's alright! If you were solving the puzzle, you'd have to find the login and password elsewhere, but for this you can just start typing.">  <img id="InfoButtonID" src="InfoButton.png"></span>
          </div>
        <div id="MainBox">
          <div id="UsernameDiv">
            <p id="UsernameLabel">Username</p>
            <input type="text" id="UsernameBox" placeholder="Enter Username">
          </div>
            <br>
          <div id="PasswordDiv">
            <p id="PasswordLabel">Password</p>
            <input id="PasswordBox" type="text" placeholder="Enter Password">
          </div> 
            <button id="LoginButtonID" onclick="LoginButton()"> LOGIN </button>
        </div>


    </main>
    <script src="index.js"></script>
  </body>
</html>
