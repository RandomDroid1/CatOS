<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>CatOS</title>
    <link rel="stylesheet" href="./landing.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    
    <main>
      <div id="LandingMainBox"> 
        <div id="LandingMainBoxHeader">
          <p id="WelcomeHeader"> 
          Welcome Window 
          </p>
        </div>
        <h1 id="LandingHeaderText"> Welcome to CatOS</h1>
        <h3 id="LandingSubtext"> The world's premier Operating System</h2>
        <p id="LandingP"> Click "Continue" to dismiss this popup.</p>
        <button id="WelcomeButton" onclick="WelcomeWindowClose()"> Continue </button>
      </div>
      <div id="TopBar">
        <p id="TopBarOSLabel">
          CatOS
        </p>
        <img class="PermanentWindowIcon" id="MapIcon" src="MapIcon.png" onclick="MapOpen()">
        <img class="PermanentWindowIcon" id="FishIcon" src="FishIcon.png" onclick="FishOpen()">
        <p id="TimeText">
          Loading...
        </p>
  
      </div>


      <div id="MapWindow">
          <div class="WindowHeader">
            <p id="MapHeader">
              All Etsy Sales
            </p>
            <p class="WindowCloseButton" onclick="MapOpen()">
              (X)
            </p>
          </div>
          <img id="EtsyMap" src="WorldMap.jpg">
      </div>

      <div id="FishWindow">
          <div class="WindowHeader">
            <p id="FishHeader">
              The Fish Zone
            </p>
            <p class="WindowCloseButton" onclick="FishOpen()">
              (X)
            </p>
          </div>
          <div id="FishSubwindow">
          <img src="FishIcon.png" id="FishGame" onclick="FishClick()">
          <p id="FishClickNumber">0</p>
          </div>
      </div>
      
    </main>
    <script src="landing.js"></script>
  </body>
</html>
